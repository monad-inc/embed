name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger for the one-time bootstrap publish

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Changesets pushes the Version Packages PR + git tags
      pull-requests: write # Changesets opens/updates the Version Packages PR
      id-token: write # OIDC trusted publishing + npm provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Trusted publishing + `--provenance` require npm >= 11.5.
      # setup-node ships npm 10.x, so upgrade explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # TEMPORARY (ENG-8648 bootstrap): a trusted publisher can't be attached
          # to a package that doesn't exist yet, so the first publish uses a token.
          # changesets/action writes the .npmrc auth from this env var; combined with
          # `id-token: write` + `publishConfig.provenance`, provenance still attaches.
          # REMOVE this line once @monad-inc/embed exists and the npmjs.com trusted
          # publisher is configured — then releases are fully tokenless.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
